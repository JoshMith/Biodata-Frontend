<div class="container">

  <!-- <div class="div-home">
    <a (click)="nav.goToDashboard()">Home</a>
  </div> -->

  <div class="header">
    <h2>Baptism Form</h2>
  </div>

  <app-progress-bar [currentStep]="currentStep"></app-progress-bar>

  <form [formGroup]="baptismForm" (ngSubmit)="onSubmitBaptismForm()" class="formContainer">

    <div class="section">
      <h3>Baptism Information</h3>

      <!-- Row 1 -->
      <div class="form-row">

        <div class="form-group">
          <label>Parish / Place of Baptism</label>
          <app-parish-autocomplete
            formControlName="parish"
            placeholder="Type parish..."
            [externalControl]="baptismForm.get('parish')">
          </app-parish-autocomplete>

          <div class="error-message" *ngIf="hasFieldError('parish')">
            {{ getFieldError('parish') }}
          </div>
        </div>

        <div class="form-group">
          <label>Date of Baptism</label>
          <input type="date"
                 formControlName="baptism_date"
                 [max]="today"
                 [class.error]="hasFieldError('baptism_date')">

          <div class="error-message" *ngIf="hasFieldError('baptism_date')">
            {{ getFieldError('baptism_date') }}
          </div>
        </div>

      </div>

      <!-- Row 2 -->
      <div class="form-row">

        <div class="form-group">
          <label>Baptism Number</label>
          <input type="text"
                 formControlName="baptism_number"
                 [class.error]="hasFieldError('baptism_number')">

          <div class="error-message" *ngIf="hasFieldError('baptism_number')">
            {{ getFieldError('baptism_number') }}
          </div>
        </div>

        <div class="form-group">
          <label>Minister</label>
          <input type="text"
                 formControlName="minister"
                 placeholder="Name of priest"
                 [class.error]="hasFieldError('minister')">

          <div class="error-message" *ngIf="hasFieldError('minister')">
            {{ getFieldError('minister') }}
          </div>
        </div>

      </div>

      <!-- Row 3 (full width) -->
      <div class="form-row">

        <div class="form-group">
          <label>Sponsor / Godparent</label>
          <input type="text"
                 formControlName="sponsor"
                 placeholder="Name of sponsor"
                 [class.error]="hasFieldError('sponsor')">

          <div class="error-message" *ngIf="hasFieldError('sponsor')">
            {{ getFieldError('sponsor') }}
          </div>
        </div>

      </div>

      <!-- Messages -->
      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

    </div>

    <!-- Buttons -->
    <div class="div-btns">
      <button type="button" (click)="navigateToPersonalInfo()">Back</button>

      <button type="submit" [disabled]="baptismForm.invalid || successMessage">
        {{ successMessage ? 'Saving...' : 'Save' }}
      </button>

      <button type="button" (click)="navigateToEucharist()">Next</button>
    </div>

  </form>
</div>

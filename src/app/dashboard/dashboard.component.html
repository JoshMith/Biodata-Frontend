<!-- Dashboard Component HTML -->

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Dashboard</h2>
        <button title="Search Christian by name, email or phone number" (click)="navigateToSearch()">Search Christian</button>
        <button [disabled]="!canAddChristian" title="Add a Christian into the system - Editors  & superusers only" (click)="navigateToForm()">Add Christian</button>
        <button (click)="logoutChristian()">Logout</button>
    </div>

    <!-- Dashboard Content -->
    <div class="dashboard">
        <h1>Archdiocese of Nyeri</h1>
        <h2>Christian Data Management System</h2>
        

        <div class="total-christians" (change)="loadUserCount()">
            Total Christians: <span id="christianCount">{{ christianCount }}</span>
        </div>

        <div *ngIf="showBanner" class="role-banner">
            {{ bannerMessage }}
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2025 Archdiocese of Nyeri. All rights reserved.</p>
    </div>
</body>

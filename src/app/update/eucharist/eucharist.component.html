<body>
    <div class="container">
        <div class="nav-buttons">
      <a type="button" href="/dashboard">
          <i class="fas fa-home"></i> Home
      </a>
      <a type="button" href="/search">
          <i class="fas fa-search"></i> Search
      </a>
    </div>
        <h2>Eucharist Form</h2>

        <app-progress-bar [currentStep]="currentStep"></app-progress-bar>
        
        <div class="error-alert" *ngIf="noEucharist">
            This Christian has not Received Eucharist! Add Eucharist Record
        </div>
        <div class="success-message" *ngIf="!noEucharist">
            Edit Eucharist Record!
        </div>
        <form [formGroup]="eucharistForm" (ngSubmit)="onSubmitEucharistForm()" class="formContainer">
            <div class="section">
                <h3>Eucharist Information</h3>
                <label for="eucharist_place">Place:</label>
                <app-parish-autocomplete
                    formControlName="eucharist_place"
                    placeholder="Type a parish name..."
                    label="Place of First Eucharist"
                    [externalControl]="eucharistForm.get('eucharist_place')"
                ></app-parish-autocomplete>
                <div class="error-message" *ngIf="hasFieldError('eucharist_place')">
                    {{ getFieldError('eucharist_place') }}
                </div>

                <label for="eucharist_date">Date:</label>
                <input type="date" id="eucharist_date" formControlName="eucharist_date" [max]="today" [class.error]="hasFieldError('eucharist_date')">
                <div class="error-message" *ngIf="hasFieldError('eucharist_date')">
                    {{ getFieldError('eucharist_date') }}
                </div>

                <!-- Feedback Messages -->
                <div class="feedback-messages">
                    <div *ngIf="successMessage" class="success-message">
                        <i class="fa fa-check-circle"></i> {{ successMessage }}
                    </div>
                    <div *ngIf="errorMessage" class="error-alert">
                        <i class="fa fa-exclamation-triangle"></i> {{ errorMessage }}
                    </div>
                </div>
            </div>

            <div class="div-btns">
                <button type="button" (click)="navigateToBaptism()">Back</button>
                <button type="submit" [disabled]="eucharistForm.invalid">Save       </button>
                <button type="button" (click)="navigateToConfirmation()">Next</button>
            </div>

        </form>
    </div>
</body>

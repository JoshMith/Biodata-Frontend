

   

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1>Parish Dashboard</h1>
                <p class="page-sub">{{ parishName }} — {{ deaneryName }} Deanery</p>
            </div>
            <div class="header-actions">
                <button class="btn-gold" (click)="navigate('/personal-info')">
                    <i class="ti ti-plus"></i> Add Christian
                </button>
            </div>
        </div>

        <div class="stats-grid" *ngIf="!isLoading">
            <div class="stat-card green">
                <div class="stat-icon"><i class="ti ti-users"></i></div>
                <div class="stat-info">
                    <span class="stat-num">{{ stats.christians }}</span>
                    <span class="stat-label">Total Christians</span>
                </div>
            </div>
            <div class="stat-card gold">
                <div class="stat-icon"><i class="ti ti-droplet"></i></div>
                <div class="stat-info">
                    <span class="stat-num">{{ stats.baptised }}</span>
                    <span class="stat-label">Baptised</span>
                </div>
            </div>
            <div class="stat-card navy">
                <div class="stat-icon"><i class="ti ti-bread"></i></div>
                <div class="stat-info">
                    <span class="stat-num">{{ stats.eucharist }}</span>
                    <span class="stat-label">First Eucharist</span>
                </div>
            </div>
            <div class="stat-card maroon">
                <div class="stat-icon"><i class="ti ti-flame"></i></div>
                <div class="stat-info">
                    <span class="stat-num">{{ stats.confirmed }}</span>
                    <span class="stat-label">Confirmed</span>
                </div>
            </div>
            <div class="stat-card dark">
                <div class="stat-icon"><i class="ti ti-heart"></i></div>
                <div class="stat-info">
                    <span class="stat-num">{{ stats.married }}</span>
                    <span class="stat-label">Married</span>
                </div>
            </div>
        </div>

        <div class="loading-state" *ngIf="isLoading">
            <div class="spinner"></div>
        </div>

        <div class="quick-actions">
            <h2>Quick Actions</h2>
            <div class="qa-grid">
                <button class="qa-card" (click)="navigate('/personal-info')">
                    <i class="ti ti-user-plus"></i>
                    <span>Add Christian</span>
                </button>
                <button class="qa-card" (click)="navigate('/baptism')">
                    <i class="ti ti-droplet"></i>
                    <span>Add Baptism</span>
                </button>
                <button class="qa-card" (click)="navigate('/eucharist')">
                    <i class="ti ti-bread"></i>
                    <span>Add Eucharist</span>
                </button>
                <button class="qa-card" (click)="navigate('/confirmation')">
                    <i class="ti ti-flame"></i>
                    <span>Add Confirmation</span>
                </button>
                <button class="qa-card" (click)="navigate('/marriage')">
                    <i class="ti ti-heart"></i>
                    <span>Add Marriage</span>
                </button>
                <button class="qa-card" (click)="navigate('/search')">
                    <i class="ti ti-search"></i>
                    <span>Search Records</span>
                </button>
            </div>
        </div>
    </main>
